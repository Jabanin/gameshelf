<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Connexion Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ✅ Firebase Compat API -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyD1jpwKHdwD_lKp-i1b_PmsKwcXJK9Nw9g",
      authDomain: "gameshelf-4e8f5.firebaseapp.com",
      projectId: "gameshelf-4e8f5",
      storageBucket: "gameshelf-4e8f5.firebasestorage.app",
      messagingSenderId: "567826044551",
      appId: "1:567826044551:web:1f06af0cd95cd572fb0a22",
      measurementId: "G-DMKXREHX43"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    document.addEventListener('DOMContentLoaded', () => {
      const loginBtn = document.getElementById('loginBtn');
      loginBtn?.addEventListener('click', () => {
        const email = document.getElementById('email')?.value;
        const password = document.getElementById('password')?.value;

        auth.signInWithEmailAndPassword(email, password)
          .then(() => {
            window.location.href = 'index.html';
          })
          .catch((error) => {
            document.getElementById('error-message').textContent = "Erreur : " + error.message;
          });
      });
    });
  </script>

  <style>
    body {
      font-family: 'Courier New', monospace;
      background-color: #111;
      color: orange;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    input, button {
      margin: 10px 0;
      padding: 10px;
      width: 250px;
      font-size: 16px;
      border: none;
      background-color: #222;
      color: orange;
      border: 2px solid orange;
    }
    #error-message {
      color: red;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h2>🎮 Connexion Admin</h2>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Mot de passe">
  <button id="loginBtn">Connexion</button>
  <a href="index.html">Retourner a la page d'accueil</a>
  <p id="error-message"></p>
</body>
</html>
