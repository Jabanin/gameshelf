<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jeux</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://unpkg.com/isotope-layout@3/dist/isotope.pkgd.min.js"></script>
</head>
<body>
  <header>
    <h1>Liste des jeux</h1>
    <input type="text" id="searchInput" placeholder="Rechercher un jeu..." />
  </header>
  <main>
    <div class="filters">
      <button class="filter-button is-checked" data-filter="*">Tous</button>
      <button class="filter-button" data-filter=".favori">Favoris</button>
    </div>
<section class="section">
    <div class="grid">
      <!-- Cartes de jeux ici -->
    </div>
</section>
    <p id="noResultsMessage" style="display: none; text-align: center; margin-top: 1rem; color: #888;">
      Aucun résultat trouvé.
    </p>
  </main>
  <script>
    const iso = new Isotope('.grid', {
      itemSelector: '.card',
      layoutMode: 'fitRows'
    });

    const searchInput = document.getElementById('searchInput');
    const noResultsMessage = document.getElementById('noResultsMessage');

    searchInput.addEventListener('input', () => {
  const query = searchInput.value.trim().toLowerCase();
  const cards = document.querySelectorAll('.grid-isotope .card');

  cards.forEach(card => {
    const match = card.textContent.toLowerCase().includes(query);
    card.classList.toggle('hidden', !match);
  });

  checkNoResults();
});
function checkNoResults() {
  const visibleItems = document.querySelectorAll('.grid-isotope .card:not(.hidden)');
  noResultsMessage.style.display = visibleItems.length === 0 ? 'block' : 'none';
}

document.querySelectorAll('.filter-button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-button').forEach(b => b.classList.remove('is-checked'));
    btn.classList.add('is-checked');
    const filterValue = btn.getAttribute('data-filter');

    const allCards = document.querySelectorAll('.grid-isotope .card');
    allCards.forEach(card => {
      const match = filterValue === '*' || card.classList.contains(filterValue.slice(1)); // .favori → favori
      card.classList.toggle('hidden', !match);
    });

    checkNoResults();
  });
});

  </script>
</body>
</html>
