<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">

  <title>GameShelf</title>
  <link rel="stylesheet" href="style.css">
  <!-- Firebase SDK -->
 <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>

<body>

<header id="mainHeader">
  <div class="header-inner">
    <img src="logo.png" alt="GameShelf" class="logo" id="logo">
    <nav class="main-nav" id="mainNav">
      <a href="index.html">Home</a>
      <a href="about.html">A propos</a>
      <a href="jeux.html">Jeux</a>
      <a href="consoles.html">Consoles</a>
      <a href="histoire.html">Histoire</a>
      <a href="zelda.html">La Collection Legend of Zelda</a>
      <a href="admin.html">Ajout</a>
    </nav>
  </div>
</header>
  <main class="section">

    <h1>Ma vie</h1>
    <div id="about" class="grid"></div>
    <h2>Jeux Vidéo</h2>
    <div id="gamesPreview" class="grid"></div>
    <div class="button"><a href="jeux.html">Voir plus</a></div>
  </main>


	<div class="grid-galerie">
  <img src="banniere.png" alt="1">
  <img src="banniere.png" alt="2">
  <img src="banniere.png" alt="3">
 <img src="banniere.png" alt="3">
<img src="banniere.png" alt="2">
  <img src="banniere.png" alt="3">
 <img src="banniere.png" alt="3">
<img src="banniere.png" alt="2">
  <img src="banniere.png" alt="3">
 <img src="banniere.png" alt="3">
</div>

<div class="lightbox" id="lightbox">
  <span class="close-btn" id="closeBtn">✖</span>
  <img id="lightbox-img" src="">
</div>
  <footer>GameShelf © 2025 — Suivi de collection personnel</footer>
  <script src="about.js"></script>
<script src="script-commun.js"></script>
<script>
  const images = document.querySelectorAll('.grid-galerie img');
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightbox-img');
  const closeBtn = document.getElementById('closeBtn');

  images.forEach(img => {
    img.addEventListener('click', () => {
      lightboxImg.src = img.src;
      lightbox.classList.add('active');
    });
  });

  closeBtn.addEventListener('click', () => {
    lightbox.classList.remove('active');
    lightboxImg.src = '';
  });

  // Fermeture au clic en dehors de l'image
  lightbox.addEventListener('click', (e) => {
    if (e.target === lightbox || e.target === closeBtn) {
      lightbox.classList.remove('active');
      lightboxImg.src = '';
    }
  });

 firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Affichage des jeux récents
    const gamesPreview = document.getElementById('gamesPreview');
    db.collection("games").where("favorite", "==", true).onSnapshot(snapshot => {
      snapshot.forEach(doc => {
        const game = doc.data();
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `
         <img src="${game.image}" alt="${game.name}" onerror="'">
          <h3>${game.name}</h3>
	<p>${game.genre}</p>
	<!--<p>${game.rating} / 10</p>
          <p>${game.console} • ${game.materiel}</p>
	<p>${game.status} • ${game.borrower}</p>
	<p>Sorti en <br>${game.year}</br></p>
	<p>Obtenu en <br>${game.obtenue ? game.obtenue.slice(0, 4) : ''}</br></p>-->
	
	<a class="button button-card">+</a>
<span style="color:gold;position:relative;bottom:-35px;"> ${game.favorite ? '<img src="star.png" alt="Favori" style="width:60px;height:60px;vertical-align:middle;margin:0;filter: drop-shadow(0px 0px 3px 	yellow)">' : ''}</span>


        `;
        gamesPreview.appendChild(div);
      });
    });

</script>
</body>
</html>
